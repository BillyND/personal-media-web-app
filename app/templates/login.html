{% extends "base.html" %} {% block title %}Login{% endblock %} {% block content
%}
<section class="login-layout">
  <div class="brand-panel">
    <p class="eyebrow">Local media studio</p>
    <h1>Personal Media</h1>
    <p>Chuyển TikTok thành MP4/MP3/Text và tạo voiceover local bằng Piper.</p>
  </div>
  <section class="card login-card" aria-labelledby="login-title">
    <h2 id="login-title">Đăng nhập</h2>
    <p class="muted">Nhập password để dùng app cá nhân.</p>
    {% if error %}
    <p class="error" role="alert">{{ error }}</p>
    {% endif %}
    <form method="post" action="/login" class="stack">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        name="password"
        placeholder="Nhập password"
        autocomplete="current-password"
        autofocus
        required
      />
      <button type="submit">Vào app</button>
    </form>
  </section>
</section>
{% endblock %}
